version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: dellcom_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Deja que DATABASE_URL se lea del archivo .env por defecto (Aiven o local)
      # Si deseas forzar la base de datos local de docker-compose, descomenta la siguiente línea:
      # DATABASE_URL: "mysql://root:rootpassword@db:3306/dellcom_db?ssl-mode=PREFERRED"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy
        required: false # No apagar la web si usamos base de datos en la nube (Aiven)
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  mysql_data:


